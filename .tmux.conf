#------------------------------#
# Prefix key setting
#------------------------------#
set -g prefix C-k
unbind C-b

#------------------------------#
# Pane settings
#------------------------------#
# v to vertical split
bind v split-window -h -c "#{pane_current_path}"
# s to horizontal split
bind s split-window -v -c "#{pane_current_path}"
# Moving between Panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#------------------------------#
# Visual Settings
#------------------------------#
# terminfo гЃ« tmux-256color гЃЊгЃ‚г‚ЊгЃ°дЅїгЃ„гЂЃгЃЄгЃ‘г‚ЊгЃ° screen-256color г‚’дЅїгЃ†
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' \
  'set -g default-terminal "tmux-256color"' \
  'set -g default-terminal "screen-256color"'
# з«Їжњ«гЃЊеЇѕеїњгЃ—гЃ¦гЃ„г‚ЊгЃ° True Color г‚’е„Єе…€
set -as terminal-overrides ',*:Tc'

set-option -g @c-base-100 "#001C23"
set-option -g @c-base-content "#FFD6A7"
set-option -g @c-primary "#BEFF00"
set-option -g @c-primary-content "#507000"
set-option -g @c-neutral "#003741"
set-option -g @c-neutral-content "#FFD6A7"
set-option -g @c-info "#00BAFE"
set-option -g @c-info-content "#042E49"

set-option -g status-justify "centre"
# Prefix гЃЊжЉјгЃ•г‚ЊгЃџж™‚гЃЇг‚№гѓ†гѓјг‚їг‚№гѓђгѓјгЃ®и‰Іг‚’е¤‰гЃ€г‚‹
set-option -g status-style "bg=#{?client_prefix,#{@c-neutral},#{@c-base-100}}"

set-option -g status-left-length 30 # default: 10
set-option -g status-left '#( \
  label=" #S "; \
  bg="#{@c-base-100}"; \
  color="#{@c-info}"; \
  text_fg="#ffffff"; \
  echo " #[bg=$bg,fg=$color]о‚¶#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]о‚ґ"; \
)'

set-option -gw window-status-separator ""
set-option -gw window-status-format '#( \
  label=" #I #W "; \
  bg="#{@c-base-100}"; \
  color="#{@c-neutral}"; \
  text_fg="#{@c-neutral-content}"; \
  if [ "#{window_bell_flag}" = "1" ]; then \
    label=" у±…« #W "; \
    color="#{@c-info}"; \
    text_fg="#{@c-info-content}"; \
  fi; \
  echo "#[bg=$bg,fg=$color]о‚ѕ#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]о‚ј"; \
)'
set-option -gw window-status-current-format '#( \
  if [ "#{session_windows}" = "1" ]; then echo ""; exit; fi; \
  label=" #W "; \
  bg="#{@c-base-100}"; \
  color="#{@c-primary}"; \
  text_fg="#{@c-primary-content}"; \
  echo "#[bg=$bg,fg=$color]о‚ѕ#[bg=$color,fg=$text_fg,bold]$label#[bg=$bg,fg=$color,nobold]о‚ј"; \
)'

set-option -g status-right '#( \
  label=" %m/%d | %a | пЂ— %H:%M "; \
  bg="#{@c-base-100}"; \
  color="#{@c-info}"; \
  text_fg="#ffffff"; \
  echo " #[bg=$bg,fg=$color]о‚¶#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]о‚ґ"; \
)'

#------------------------------#
# Mouse settings
#------------------------------#
# enable mouse select
set-option -g mouse on
setw -g mode-keys vi
# bind -T copy-mode-vi Esc send-keys -X clear-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# гѓћг‚¦г‚№гѓ›г‚¤гѓјгѓ«гЃ§г‚№г‚Їгѓ­гѓјгѓ«гЃ§гЃЌг‚‹г‚€гЃ†гЃ«гЃ™г‚‹
set -as terminal-overrides ',xterm*:smcup@:rmcup@'

#------------------------------#
# Notification
#------------------------------#
set -g allow-passthrough all
# и‡Єе‹•йЂљзџҐгЃ®жњ‰еЉ№еЊ–
setw -g monitor-activity on
set -g visual-activity on
# BEL г‚’ tmux е†…гЃ§жЏЎг‚ЉгЃ¤гЃ¶гЃ•гЃље¤–еЃґз«Їжњ«гЃёжёЎгЃ™
set -g visual-bell off
# д»–г‚¦г‚Јгѓігѓ‰г‚¦гЃ®bellж¤њзџҐг‚’жњ‰еЉ№еЊ–
set -g bell-action any
setw -g monitor-bell on
# pane гЃ‹г‚‰ BEL г‚’еЏ—гЃ‘гЃџг‚‰йџіг‚’йіґг‚‰гЃ™
set-hook -g alert-bell 'run-shell "/usr/bin/afplay /System/Library/Sounds/Glass.aiff >/dev/null 2>&1"'

#------------------------------#
# Others
#------------------------------#
# R to reload this file
bind R source-file ~/.tmux.conf \; display "Reloaded!"
# Ctrl-g гЃ§ lazygit г‚’гѓќгѓѓгѓ—г‚ўгѓѓгѓ—иЎЁз¤є
bind-key -n C-g display-popup -w 80% -h 80% -d "#{pane_current_path}" -E lazygit
# prefix + P гЃ§гѓќгѓѓгѓ—г‚ўгѓѓгѓ—г‚·г‚§гѓ«г‚’й–‹гЃЏ
bind P display-popup -w 80% -h 80% -d "#{pane_current_path}" -E "zsh"

# е¤–еЃґз«Їжњ«гЃ®г‚їгѓ–/г‚¦г‚Јгѓігѓ‰г‚¦г‚їг‚¤гѓ€гѓ«гЃ« tmux г‚»гѓѓг‚·гѓ§гѓіеђЌг‚’иЎЁз¤є
set -g set-titles on
set -g set-titles-string '#S'

# vi keybind on copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

set-option -g history-limit 50000  # default: 2000
